<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #121824; color: white; padding: 50px; }
    .upload-box { border: 2px dashed #3b82f6; padding: 40px; border-radius: 10px; display: inline-block; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; }
    #downloadArea { margin-top: 30px; display: none; }
    .btn-download { background: #10b981; padding: 12px 25px; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
    #loader { display: none; color: #f59e0b; margin-top: 15px; }
  </style>
</head>
<body>

  <h2>مترجم المستندات الفوري 🚀</h2>
  <p>ارفع ملفك المكتوب بالإنكليزية لتحصل على نسخة مدمجة (صفحة إنكليزي / صفحة عربي)</p>

  <div class="upload-box">
    <input type="file" id="userFile" accept="image/*,application/pdf"><br>
    <button onclick="startTranslation()">ترجم الملف الآن</button>
    <div id="loader">جاري المعالجة والترجمة... يرجى الانتظار ⏳</div>
  </div>

  <div id="downloadArea">
    <a id="downloadLink" class="btn-download" href="#" target="_blank">لتحميل الملف المترجم اضغط هنا 📥</a>
  </div>

  <script>
    function startTranslation() {
      const fileInput = document.getElementById('userFile');
      if (fileInput.files.length === 0) {
        alert("الرجاء اختيار ملف أولاً!");
        return;
      }

      document.getElementById('loader').style.display = 'block';
      document.getElementById('downloadArea').style.display = 'none';

      const file = fileInput.files[0];
      const reader = new FileReader();
      
      reader.onload = function(e) {
        const bytes = e.target.result.split(',')[1]; // تحويل الملف لـ Base64 ليرسل لغوغل
        
        // استدعاء دالة غوغل بالخلفية
        google.script.run
          .withSuccessHandler(function(downloadUrl) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('downloadLink').href = downloadUrl;
            document.getElementById('downloadArea').style.display = 'block';
          })
          .withFailureHandler(function(err) {
            alert("حدث خطأ أثناء الترجمة: " + err);
            document.getElementById('loader').style.display = 'none';
          })
          .processFile(bytes, file.name, file.type);
      };
      
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
