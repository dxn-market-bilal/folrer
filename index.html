<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظم الألبومات الذكي</title>
    <!-- Tailwind CSS لتصميم عصري وخيالي -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- مكتبة أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- شريط العنوان -->
    <header class="bg-slate-800/80 backdrop-blur border-b border-slate-700 sticky top-0 z-50 px-4 py-4 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2 text-emerald-400">
                <i class="fa-solid fa-folder-tree text-2xl"></i>
                <span>ألبوماتي الذكية</span>
            </h1>
            <button onclick="openNewAlbumModal()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold px-4 py-2 rounded-full text-sm transition-all shadow-lg flex items-center gap-1">
                <i class="fa-solid fa-plus"></i> ألبوم جديد
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        
        <!-- قسم إضافة ملف جديد -->
        <section class="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-5 mb-8 shadow-xl">
            <h2 class="text-md font-semibold mb-4 text-slate-300 flex items-center gap-2">
                <i class="fa-solid fa-file-import text-emerald-400"></i> إضافة ملف للألبوم
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- اختيار الألبوم المستهدف -->
                <div>
                    <label class="block text-xs text-slate-400 mb-1">اختر الألبوم</label>
                    <select id="target-album-select" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500 text-slate-200">
                        <!-- سيتم تعبئتها برمجياً -->
                    </select>
                </div>
                <!-- رفع الملف -->
                <div class="md:col-span-2">
                    <label class="block text-xs text-slate-400 mb-1">اختر الملف (صوت، صورة، مستند)</label>
                    <div class="flex gap-2">
                        <input type="file" id="file-input" class="hidden" onchange="handleFileSelect(event)">
                        <button onclick="document.getElementById('file-input').click()" class="flex-1 bg-slate-900 border border-dashed border-slate-600 hover:border-emerald-500 rounded-xl py-2 px-4 text-sm text-slate-400 hover:text-emerald-400 transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <span id="file-name-display">اختر من جهازك...</span>
                        </button>
                        <button onclick="addFileToAlbum()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold px-5 rounded-xl transition-all">إضافة</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- الألبومات والملفات -->
        <section>
            <h2 class="text-lg font-bold mb-4 text-slate-200 flex items-center gap-2">
                <i class="fa-solid fa-images text-emerald-400"></i> ألبوماتك الحالية
            </h2>
            <div id="albums-container" class="space-y-6">
                <!-- سيتم توليد الألبومات هنا تلقائياً -->
            </div>
        </section>
    </main>

    <!-- نافذة منبثقة (Modal) لإنشاء ألبوم جديد -->
    <div id="new-album-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-md p-6 shadow-2xl scale-95 transition-all">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-emerald-400">
                <i class="fa-solid fa-folder-plus"></i> إنشاء ألبوم جديد
            </h3>
            <div class="mb-4">
                <label class="block text-xs text-slate-400 mb-1">اسم الألبوم</label>
                <input type="text" id="new-album-name" placeholder="مثال: صوتيات دكسن، ملفات سادس..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-500 text-slate-200">
            </div>
            <div class="flex justify-end gap-2">
                <button onclick="closeNewAlbumModal()" class="bg-slate-700 hover:bg-slate-600 text-slate-300 px-4 py-2 rounded-xl text-sm transition-all">إلغاء</button>
                <button onclick="createNewAlbum()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold px-5 py-2 rounded-xl text-sm transition-all">إنشاء</button>
            </div>
        </div>
    </div>

    <!-- جافا سكريبت لتشغيل التطبيق بالكامل بشكل تفاعلي -->
    <script>
        // الألبومات الافتراضية عند تشغيل التطبيق أول مرة
        let albums = {
            "الملفات العامة": [],
            "صوتيات وموسيقى": [],
            "المستندات الهامة": []
        };

        let tempSelectedFile = null;

        // لتحديث القوائم وعرض البيانات
        function updateUI() {
            const container = document.getElementById('albums-container');
            const select = document.getElementById('target-album-select');
            
            container.innerHTML = '';
            select.innerHTML = '';

            // إذا لم تكن هناك ألبومات
            if (Object.keys(albums).length === 0) {
                container.innerHTML = `<p class="text-slate-500 text-center py-10">لا توجد ألبومات حالياً. اضغط على ألبوم جديد للبدء!</p>`;
                return;
            }

            for (const [albumName, files] of Object.entries(albums)) {
                // تعبئة قائمة الاختيار لشاشة الإضافة
                const option = document.createElement('option');
                option.value = albumName;
                option.textContent = albumName;
                select.appendChild(option);

                // بناء واجهة الألبوم
                const albumCard = document.createElement('div');
                albumCard.className = 'bg-slate-800/30 border border-slate-700/40 rounded-2xl p-5 shadow-lg';
                
                let filesHTML = '';
                if (files.length === 0) {
                    filesHTML = `<p class="text-slate-500 text-sm py-4 text-center">هذا الألبوم فارغ حالياً.</p>`;
                } else {
                    filesHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-4">`;
                    files.forEach((file, index) => {
                        let mediaElement = '';
                        let icon = '<i class="fa-solid fa-file-invoice text-slate-400 text-lg"></i>';

                        // إذا كان الملف صورة
                        if (file.type.startsWith('image/')) {
                            mediaElement = `<img src="${file.data}" class="w-full h-32 object-cover rounded-lg mb-2 shadow">`;
                            icon = '<i class="fa-solid fa-image text-emerald-400 text-lg"></i>';
                        } 
                        // إذا كان الملف صوتي
                        else if (file.type.startsWith('audio/')) {
                            mediaElement = `
                                <div class="bg-slate-900/80 p-2 rounded-lg mb-2">
                                    <audio controls class="w-full h-8 accent-emerald-500">
                                        <source src="${file.data}" type="${file.type}">
                                    </audio>
                                </div>`;
                            icon = '<i class="fa-solid fa-music text-blue-400 text-lg"></i>';
                        }
                        // ملفات أخرى (PDF, Word)
                        else if (file.name.endsWith('.pdf')) {
                            icon = '<i class="fa-solid fa-file-pdf text-red-500 text-lg"></i>';
                        } else if (file.name.endsWith('.doc') || file.name.endsWith('.docx')) {
                            icon = '<i class="fa-solid fa-file-word text-blue-500 text-lg"></i>';
                        } else if (file.name.endsWith('.xls') || file.name.endsWith('.xlsx')) {
                            icon = '<i class="fa-solid fa-file-excel text-emerald-500 text-lg"></i>';
                        }

                        filesHTML += `
                            <div class="bg-slate-900/50 border border-slate-800 p-3 rounded-xl flex flex-col justify-between hover:border-slate-700 transition-all">
                                ${mediaElement}
                                <div class="flex items-center justify-between gap-2 mt-1">
                                    <div class="flex items-center gap-2 overflow-hidden">
                                        ${icon}
                                        <span class="text-xs text-slate-300 truncate font-medium" title="${file.name}">${file.name}</span>
                                    </div>
                                    <button onclick="deleteFile('${albumName}', ${index})" class="text-slate-500 hover:text-red-400 p-1 rounded-lg transition-all" title="حذف الملف">
                                        <i class="fa-solid fa-trash-can text-sm"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                    filesHTML += `</div>`;
                }

                albumCard.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-700/50 pb-3">
                        <h3 class="font-bold text-slate-200 flex items-center gap-2">
                            <i class="fa-solid fa-folder-open text-amber-400"></i>
                            <span>${albumName}</span>
                            <span class="text-xs bg-slate-700 text-slate-300 px-2.5 py-0.5 rounded-full">${files.length} ملف</span>
                        </h3>
                        <button onclick="deleteAlbum('${albumName}')" class="text-slate-500 hover:text-red-400 transition-all text-sm flex items-center gap-1">
                            <i class="fa-solid fa-folder-minus"></i> حذف الألبوم
                        </button>
                    </div>
                    ${filesHTML}
                `;
                container.appendChild(albumCard);
            }
        }

        // فتح وإغلاق النافذة المنبثقة للألبوم الجديد
        function openNewAlbumModal() {
            const modal = document.getElementById('new-album-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeNewAlbumModal() {
            const modal = document.getElementById('new-album-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('new-album-name').value = '';
        }

        // إنشاء ألبوم مخصص جديد
        function createNewAlbum() {
            const nameInput = document.getElementById('new-album-name');
            const name = nameInput.getClientRects ? nameInput.value.trim() : "";
            const albumName = document.getElementById('new-album-name').value.trim();
            if (!albumName) {
                alert("الرجاء إدخال اسم الألبوم!");
                return;
            }
            if (albums[albumName]) {
                alert("هذا الألبوم موجود بالفعل!");
                return;
            }
            albums[albumName] = [];
            updateUI();
            closeNewAlbumModal();
        }

        // حذف ألبوم بالكامل
        function deleteAlbum(albumName) {
            if (confirm(`هل أنت متأكد من حذف ألبوم "${albumName}" بجميع ملفاته؟`)) {
                delete albums[albumName];
                updateUI();
            }
        }

        // معالجة اختيار الملف
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                tempSelectedFile = {
                    name: file.name,
                    type: file.type,
                    data: e.target.result // محتوى الملف مشفر كـ base64 لتشغيله أو عرضه
                };
                document.getElementById('file-name-display').textContent = file.name;
                document.getElementById('file-name-display').classList.remove('text-slate-400');
                document.getElementById('file-name-display').classList.add('text-emerald-400', 'font-semibold');
            };
            reader.readAsDataURL(file);
        }

        // إضافة الملف للألبوم المختار يدوياً
        function addFileToAlbum() {
            const targetAlbum = document.getElementById('target-album-select').value;
            if (!tempSelectedFile) {
                alert("الرجاء اختيار ملف أولاً من جهازك!");
                return;
            }
            if (!targetAlbum) {
                alert("يرجى اختيار ألبوم، أو إنشاء ألبوم جديد أولاً!");
                return;
            }

            albums[targetAlbum].push(tempSelectedFile);
            tempSelectedFile = null;
            document.getElementById('file-name-display').textContent = "اختر من جهازك...";
            document.getElementById('file-name-display').className = "text-slate-400";
            document.getElementById('file-input').value = '';
            updateUI();
        }

        // حذف ملف من الألبوم
        function deleteFile(albumName, index) {
            albums[albumName].splice(index, 1);
            updateUI();
        }

        // تشغيل الواجهة الافتراضية
        updateUI();
    </script>
</body>
</html>
